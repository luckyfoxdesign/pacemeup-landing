services:
  dev:
    build:
      context: .
      target: development
    command: npm run dev
    ports:
      - "4321:4321"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - ASTRO_TELEMETRY_DISABLED=1

  build:
    build:
      context: .
      target: development
    command: npm run build
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - ASTRO_TELEMETRY_DISABLED=1

volumes:
  node_modules:
